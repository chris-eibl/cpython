name: Tests

on:
  workflow_dispatch:
  push:
    branches:
    - 'main'
    - '3.*'
  pull_request:
    branches:
    - 'main'
    - '3.*'

permissions:
  contents: read

concurrency:
  # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#concurrency
  # 'group' must be a key uniquely representing a PR or push event.
  # github.workflow is the workflow name
  # github.actor is the user invoking the workflow
  # github.head_ref is the source branch of the PR or otherwise blank
  # github.run_id is a unique number for the current run
  group: ${{ github.workflow }}-${{ github.actor }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

jobs:
  build-windows:
    name: >-
      Windows
      ${{ fromJSON(matrix.free-threading) && '(free-threading)' || '' }}
    # needs: build-context
    # if: fromJSON(needs.build-context.outputs.run-windows-tests)
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - Win32
          - arm64
        free-threading:
          - false
          - true
        interpreter:
          - regular
          - tail-calling
        supports_msvc_tail_calling:
          # only supported on main / 3.15+ branches
          - ${{ startsWith(github.ref_name, 'main') || startsWith(github.ref_name, '3.15') || startsWith(github.base_ref, 'main') || startsWith(github.base_ref, '3.15')}}
        exclude:
          # Skip Win32 on free-threaded builds
          - { arch: Win32, free-threading: true }
          # Skip tail-calling interpreter on MSVC when it is not supported
          - { interpreter: tail-calling, supports_msvc_tail_calling: false }
          - { arch: [Win32, arm64], interpreter: tail-calling }

    uses: ./.github/workflows/reusable-windows.yml
    with:
      arch: ${{ matrix.arch }}
      free-threading: ${{ matrix.free-threading }}
      interpreter: ${{ matrix.interpreter }}
      supports_msvc_tail_calling: ${{ matrix.supports_msvc_tail_calling }}
